apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: omnivideo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/omnivideo/omnivideo-worker:latest
          command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=info", "--queues=video_processing,ai_agents", "--concurrency=4", "-n", "worker@%h"]
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:postgres@postgres:5432/omnivideo
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: omnivideo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      containers:
        - name: flower
          image: ghcr.io/omnivideo/omnivideo-worker:latest
          command: ["celery", "-A", "app.workers.celery_app:celery_app", "flower", "--port=5555"]
          ports:
            - containerPort: 5555
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: omnivideo
spec:
  selector:
    app: flower
  ports:
    - port: 5555
      targetPort: 5555
  type: ClusterIP
